name: Monthly Release HPLIP Packages

on:
  # Monthly scheduled release (first day of each month at 02:00 UTC)
  schedule:
    - cron: '0 2 1 * *'

env:
  PODMAN_VERSION: '4.9'

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      release_month: ${{ steps.release_meta.outputs.release_month }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Release metadata
        id: release_meta
        run: |
          # Use UTC to keep tags consistent across runners/timezones.
          echo "release_month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Build matrix JSON (all distros)
        id: matrix
        run: |
          set -euo pipefail
          JSON='["ubuntu-22.04","ubuntu-20.04","debian-12","fedora-39","opensuse-15.5"]'
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Building for: $JSON"

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Select OCI engine (prefer podman, fallback docker)
        run: |
          set -euo pipefail

          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman || true
          fi

          if command -v podman >/dev/null 2>&1; then
            OCI_BIN=podman
            podman --version
          elif command -v docker >/dev/null 2>&1; then
            OCI_BIN=docker
            docker --version
          else
            echo "Neither podman nor docker is available on the runner." >&2
            exit 1
          fi

          echo "OCI_BIN=$OCI_BIN" >> "$GITHUB_ENV"

      - name: Build container image
        run: |
          "$OCI_BIN" build -t hp-scanner-driver-${{ matrix.distro }}-builder \
            -f Containerfile.${{ matrix.distro }} .

      - name: Prepare output directory
        run: |
          mkdir -p output

      - name: Build package
        run: |
          "$OCI_BIN" run --rm \
            -v ${{ github.workspace }}/output:/build/output \
            hp-scanner-driver-${{ matrix.distro }}-builder \
            ${{ needs.prepare.outputs.version }}

      - name: List built packages
        run: |
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.distro }}
          path: |
            output/*.deb
            output/*.rpm
            output/*.dsc
            output/*.src.rpm
            output/*.tar.*
            output/*.asc
            output/*.sha256
            output/*.md5
            output/upstream-provenance-*.txt
            output/*.log
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect all packages
        run: |
          mkdir -p release-packages
          # Release assets:
          # - Include installable binaries (*.deb/*.rpm) for end users.
          # - Include md5sums manifest for end users (covers upstream tarball + built packages).
          # - Include source and integrity artifacts (*.dsc, *.tar.*, *.src.rpm, *.asc, checksums) for admins/maintainers/compliance.
          # - Exclude logs.
          find artifacts/ -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "md5sums-*.md5" \) \
            -print0 | xargs -0 -I {} cp {} release-packages/

          find artifacts/ -type f \
            \( -name "*.dsc" -o -name "*.src.rpm" -o -name "*.tar.*" -o -name "*.asc" -o -name "*.sha256" -o \( -name "*.md5" -a ! -name "md5sums-*.md5" \) -o -name "upstream-provenance-*.txt" \) \
            -print0 | while IFS= read -r -d '' f; do
              base="$(basename "$f")"
              cp "$f" "release-packages/ADMIN-${base}"
            done
          ls -lh release-packages/

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << ENDNOTES
          # hp-scanner-driver ${{ needs.prepare.outputs.version }}

          Automated monthly build for multiple Linux distributions.

          ## Installation

          ### Debian/Ubuntu/Mint

            sudo apt install ./hp-scanner-driver_*${{ needs.prepare.outputs.version }}*.deb

          ### Fedora/openSUSE

            sudo dnf install ./hp-scanner-driver-*${{ needs.prepare.outputs.version }}*.rpm
            # or
            sudo zypper install ./hp-scanner-driver-*${{ needs.prepare.outputs.version }}*.rpm

          ## Important Notes

          ### Proprietary Plugin

          Some HP devices require a proprietary plugin for scanning. If scanning fails with "Error during device I/O", run:

            hp-plugin -i

          ### Python Shebang Fix

          If GUI tools fail with python2 errors, run:

            sudo sed -i '1s|.*|#!/usr/bin/python3|' /usr/share/hplip/*.py

          ## Documentation

          - See README.md for installation instructions
          - See TEST.md for test results
          - See PAIN.md for known issues
          ENDNOTES
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.release_month }}
          name: hp-scanner-driver ${{ needs.prepare.outputs.version }} (${{ needs.prepare.outputs.release_month }})
          body_path: RELEASE_NOTES.md
          files: release-packages/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
