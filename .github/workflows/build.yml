name: Build HPLIP Packages

on:
  # Monthly scheduled build (first day of each month at 02:00 UTC)
  schedule:
    - cron: '0 2 1 * *'
  
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      version:
        description: 'HPLIP version to build (default: from VERSION file)'
        required: false
        default: ''
        type: string
      
      create_release:
        description: 'Create GitHub release with built packages'
        required: false
        default: false
        type: boolean
      
      distros:
        description: 'Distributions to build (comma-separated: ubuntu-22.04,ubuntu-20.04,debian-12,fedora-39,opensuse-15.5)'
        required: false
        default: 'ubuntu-22.04,ubuntu-20.04,debian-12,fedora-39,opensuse-15.5'
        type: string

env:
  PODMAN_VERSION: '4.9'

jobs:
  # Determine what to build
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      distros: ${{ steps.distros.outputs.distros }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          fi
      
      - name: Parse distro list
        id: distros
        run: |
          DISTROS="${{ github.event.inputs.distros }}"
          if [ -z "$DISTROS" ]; then
            DISTROS="ubuntu-22.04,ubuntu-20.04,debian-12,fedora-39,opensuse-15.5"
          fi
          echo "distros=$DISTROS" >> $GITHUB_OUTPUT
          
          # Convert to JSON array for matrix
          MATRIX=$(echo "$DISTROS" | tr ',' '\n' | jq -R . | jq -s .)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
      
      - name: Show build configuration
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Distros: ${{ steps.distros.outputs.distros }}"
          echo "Matrix: ${{ steps.matrix.outputs.matrix }}"

  # Build packages for each distribution
  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version
      
      - name: Build container image
        run: |
          podman build -t hp-scanner-driver-${{ matrix.distro }}-builder \
            -f Containerfile.${{ matrix.distro }} .
      
      - name: Build package
        run: |
          podman run --rm \
            -v ${{ github.workspace }}/output:/build/output \
            hp-scanner-driver-${{ matrix.distro }}-builder \
            ${{ needs.prepare.outputs.version }}
      
      - name: List built packages
        run: |
          ls -lh output/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.distro }}
          path: |
            output/*.deb
            output/*.rpm
          retention-days: 30

  # Create release if requested
  release:
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    if: github.event.inputs.create_release == 'true'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Collect all packages
        run: |
          mkdir -p release-packages
          find artifacts/ -name "*.deb" -o -name "*.rpm" | xargs -I {} cp {} release-packages/
          ls -lh release-packages/
      
      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << EOF
          # hp-scanner-driver ${{ needs.prepare.outputs.version }}
          
          Automated build for the following distributions:
          
          ${{ needs.prepare.outputs.distros }}
          
          ## Installation
          
          ### Debian/Ubuntu/Mint
          
          \`\`\`bash
          sudo apt install ./hp-scanner-driver_*${{ needs.prepare.outputs.version }}*.deb
          \`\`\`
          
          ### Fedora/openSUSE
          
          \`\`\`bash
          sudo dnf install ./hp-scanner-driver-*${{ needs.prepare.outputs.version }}*.rpm
          # or
          sudo zypper install ./hp-scanner-driver-*${{ needs.prepare.outputs.version }}*.rpm
          \`\`\`
          
          ## Important Notes
          
          ### Proprietary Plugin
          
          Some HP devices require a proprietary plugin for scanning. If scanning fails with "Error during device I/O", run:
          
          \`\`\`bash
          hp-plugin -i
          \`\`\`
          
          ### Python Shebang Fix
          
          If GUI tools fail with python2 errors, run:
          
          \`\`\`bash
          sudo sed -i '1s|.*|#!/usr/bin/python3|' /usr/share/hplip/*.py
          \`\`\`
          
          ## Documentation
          
          - See README.md for installation instructions
          - See TEST.md for test results
          - See PAIN.md for known issues
          EOF
          cat RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: hp-scanner-driver ${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: release-packages/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
